name: Build Project

on:
  push:
    branches: [master, ver/*]
  pull_request:
    branches: [master, ver/*]

  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Run Prettier
        run: npm run prettier

  build:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test:coverage
      - name: Archive Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/lcov-report
      - name: Build Project
        run: npm run build
      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: dist
